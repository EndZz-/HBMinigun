name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4.2.2
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build vite project
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder build --win --x64 --publish never

      - name: Upload installer to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          EXE=$(ls dist_electron/HBMiniGun_v*.exe | grep -v blockmap | head -1)
          BLOCKMAP="${EXE}.blockmap"
          LATEST_YML="dist_electron/latest.yml"

          # Use RUNNER_TEMP — guaranteed writable on all GitHub runners (Windows/Linux/Mac)
          NOTES_FILE="$RUNNER_TEMP/notes.txt"
          PAYLOAD_FILE="$RUNNER_TEMP/release_payload.json"
          RELEASE_FILE="$RUNNER_TEMP/release.json"

          # Build release notes from commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:'- %s' | head -30 > "$NOTES_FILE"
          else
            git log --pretty=format:'- %s' | head -30 > "$NOTES_FILE"
          fi

          # Use node to safely build and parse JSON (always available, cross-platform)
          node -e "
            const fs = require('fs');
            const notes = fs.readFileSync(process.env.NOTES_FILE, 'utf8').trim();
            const payload = JSON.stringify({
              tag_name: process.env.VERSION,
              name: process.env.VERSION,
              body: notes,
              draft: false,
              prerelease: false
            });
            fs.writeFileSync(process.env.PAYLOAD_FILE, payload);
          " VERSION="${VERSION}" NOTES_FILE="${NOTES_FILE}" PAYLOAD_FILE="${PAYLOAD_FILE}"

          RELEASE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            --data-binary @"$PAYLOAD_FILE")

          echo "$RELEASE" > "$RELEASE_FILE"
          UPLOAD_URL=$(node -e "
            const d = JSON.parse(require('fs').readFileSync(process.env.RELEASE_FILE, 'utf8'));
            console.log(d.upload_url.replace(/\\{.*/, ''));
          " RELEASE_FILE="${RELEASE_FILE}")
          echo "Upload URL: $UPLOAD_URL"

          # Upload installer exe
          echo "Uploading $EXE..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=$(basename $EXE)" \
            --data-binary @"$EXE"

          # Upload blockmap
          echo "Uploading blockmap..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=$(basename $BLOCKMAP)" \
            --data-binary @"$BLOCKMAP"

          # Upload latest.yml (for auto-updater)
          if [ -f "$LATEST_YML" ]; then
            echo "Uploading latest.yml..."
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: text/yaml" \
              "${UPLOAD_URL}?name=latest.yml" \
              --data-binary @"$LATEST_YML"
          fi

          echo "Done."
